name: Recover Node App

on:
  workflow_dispatch:
    inputs:
      reason:
        required: false

concurrency:
  group: node-recover
  cancel-in-progress: false

jobs:
  recover:

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:

      - name: Run restore.sh

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.SERVER_HOST }}

          username: ${{ secrets.SERVER_USER }}

          key: ${{ secrets.SERVER_KEY }}

          port: ${{ secrets.SERVER_PORT }}

          script: |

            bash ~/restore.sh
