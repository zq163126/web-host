name: Recover Node App

on:
  workflow_dispatch:
    inputs:
      reason:
        required: false

concurrency:
  group: node-recover
  cancel-in-progress: false

jobs:
  recover:

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:

      - name: Run restore.sh
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            bash ~/restore.sh
